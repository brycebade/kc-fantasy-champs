<!DOCTYPE html>
<html lang="en" data-theme="kcTheme">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KC Fantasy Champs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./output.css">
    <script>
        try {
            const cached = localStorage.getItem("kc-last-theme")
            if (cached) document.documentElement.setAttribute("data-theme", cached)
        } catch (e) {}
    </script>
</head>
<body class="bg-base-200 text-base-content min-h-screen overflow-x-hidden">
    <div id="navbar"></div>

    <div id="nflScoreContainer"></div>

    <div class="main-layout">

        <aside class="left-column">

            <div class="card bg-base-100 shadow-md border border-base-300 rounded-xl overflow-hidden">
                <div class="bg-neutral text-white px-4 py-2">
                    <h2 class="font-bold uppercase tracking-wide text-sm">2026 Draft Order</h2>
                </div>
                <div class="card-body p-4">
                        <ol id="draftOrderList" class="space-y-2"></ol>
                </div>
            </div>

            <div class="card bg-base-100 shadow-md border border-base-300 rounded-xl overflow-hidden">
                <div class="bg-neutral text-white px-4 py-2">
                    <h2 class="font-bold uppercase tracking-wide text-sm">Power Rankings</h2>
                </div>
                <div class="card-body p-4">
                    <p class="text-sm opacity-70 mt-2"></p>
                    <div id="powerRankingsContainer"></div>
                    <a href="powerRankings.html" class="block text-center text-sm font-semibold text-primary hover:underline mt-3">
                        View Full Rankings →
                    </a>
                </div>
            </div>
        </aside>

        <main class="right-column">

            <div id="eventListContainer" class="mb-6"></div>

            <section class="card bg-base-100 shadow-md border border-base-300 rounded-xl overflow-hidden">    
                <div class="bg-neutral text-white px-4 py-2">
                    <h2 class="font-bold uppercase tracking-wide text-sm">Around the League / Fantasy Football News</h2>
                </div>
                <div class="card-body p-4">
                    <div id="fantasyNewsContainer" class="grid gap-4 md:grid-cols-2"></div>
                </div>
            </section>
        </main>

    </div>              

    <script type="module" src="./index.js"></script>
</body>
</html>
