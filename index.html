<!DOCTYPE html>
<html lang="en" data-theme="kcTheme">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KC Fantasy Champs</title>
    <link rel="stylesheet" href="./output.css">
</head>
<body class="bg-base-200 text-base-content min-h-screen overflow-x-hidden">
    <div id="navbar"></div>

    <div id="nflScoreContainer"></div>

    <div class="main-layout">

        <aside class="left-column">

            <div class="card bg-base-100 shadow-md border border-base-300 rounded-xl">
                <div class="card-body p-4">
                    <h2 class="card-title text-primary">2026 Draft Order</h2>
                        <ol id="draftOrderList" class="space-y-2 mt-4"></ol>
                </div>
            </div>

            <div class="card bg-base-100 shadow-md border border-base-300 rounded-xl">
                <div class="card-body p-4">
                    <h2 class="card-title text-primary">Power Rankings</h2>
                    <p class="text-sm opacity-70 mt-2"></p>
                    <div id="powerRankingsContainer"></div>
                </div>
            </div>
        </aside>

        <main class="right-column">

            <div id="eventListContainer" class="mb-6"></div>

            <section class="card bg-base-100 shadow-md border border-base-300 round-xl">
                <div class="card-body p-4">
                    <p class="text-sm uppercase tracking-wide text-primary font-bold">Around the League</p>
                        <h2 class="text-2xl font-bold mb-4">Fantasy Football News</h2>
                    <div id="fantasyNewsContainer" class="grid gap-4 md:grid-cols-2"></div>
                </div>
            </section>
        </main>

    </div>              

    <script type="module" src="./index.js"></script>
</body>
</html>
