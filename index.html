<!DOCTYPE html>
<html lang="en" data-theme="kcTheme">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KC Fantasy Champs</title>
    <link rel="stylesheet" href="./output.css">
</head>
<body class="bg-base-200 text-base-content min-h-screen overflow-x-hidden">
    <div id="navbar"></div>

    <div id="eventListContainer"></div>

    <main class="p-4">
        <aside class="m-4 w-80">
            <div class="card bg-base-100 shadow-md border border-base-300 rounded-xl">
                <div class="card-body p-4">
                    <h2 class="card-title text-primary">2026 Draft Order</h2>
                
                    <ol id="draftOrderList" class="space-y-2 mt-4"></ol>
                </div>
            </div>
        </aside>
    </main>

    <section class="max-w-5xl mx-auto px-4 py-8">
        <div class="flex items-center justify-between mb-4">
            <div>
                <p class="text-sm uppercase tracking-wide text-primary font-bold">
                    Around the League
                </p>
                <h2 class="text-2xl md:text-3xl font-bold">
                    Fantasy Football News
                </h2>
            </div>
        </div>

        <div id="fantasyNewsContainer" class="grid gap-4 md:grid-cols-2"></div>
    </section>
    
    
    <script type="module" src="./index.js"></script>
</body>
</html>
