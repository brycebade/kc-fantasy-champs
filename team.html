<!DOCTYPE html>
<html lang="en" data-theme="kcTheme">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team | KC Fantasy Champs</title>
    <link rel="stylesheet" href="./output.css">
</head>
<body class="bg-base-200 text-base-content min-h-screen overflow-x-hidden">
    <div id="navbar"></div>

    <div class="bg-base-100 shadow-sm border-t border-base-300">
        <div class="max-w-7xl mx-auto px-4">
            <ul class="menu menu-horizontal py-1 gap-1 flex-wrap">
                <li><a href="#roster" class="text-sm font-medium">Roster</a></li>
                <li><a href="#team-history" class="text-sm font-medium">Team History</a></li>
                <li><a href="#head-to-head" class="text-sm font-medium">Head to Head</a></li>
                <li><a href="#draft-history" class="text-sm font-medium">Draft History</a></li>
                <li><a href="#awards" class="text-sm font-medium">Awards</a></li>
            </ul>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-4 py-6">
        <h1 id="team-name" class="text-3xl font-bold"></h1>
        <p id="owner-name" class="text-lg opacity-70"></p>
    </div>

    <section id="roster" class="max-w-7xl mx-auto px-4 py-6">
        <h2 class="text-2xl font-bold mb-4">Roster</h2>
        <div id="rosterContainer"></div>
    </section>

    <section id="team-history" class="max-w-7xl mx-auto px-4 py-6">
        <h2 class="text-2xl font-bold mb-4">Team History</h2>
    </section>

    <section id="head-to-head" class="max-w-7xl mx-auto px-4 py-6">
        <h2 class="text-2xl font-bold mb-4">Head to Head</h2>
    </section>

    <section id="draft-history" class="max-w-7xl mx-auto px-4 py-6">
        <h2 class="text-2xl font-bold mb-4">Draft History</h2>
        <select id="draftSeasonSelect" class="select select-bordered w-full max-w-xs mb-4"></select>
        <div id="draftHistoryContainer"></div>
    </section>

    <section id="awards" class="max-w-7xl mx-auto px-4 py-6">
        <h2 class="text-2xl font-bold mb-4">Awards</h2>
    </section>


    
    <script type="module" src="./team.js"></script>
</body>
</html>
