<!DOCTYPE html>
<html lang="en" data-theme="kcTheme">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team | KC Fantasy Champs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./output.css">
    <script>
        try {
            const cached = localStorage.getItem("kc-last-theme")
            if (cached) document.documentElement.setAttribute("data-theme", cached)
        } catch (e) {}
    </script>
</head>
<body class="bg-base-200 text-base-content min-h-screen overflow-x-hidden">
    <div id="navbar"></div>

    <div class="bg-base-100 shadow-sm border-t border-base-300">
        <div class="max-w-7xl mx-auto px-4">
            <ul class="menu menu-horizontal py-1 gap-1 flex-wrap">
                <li><a href="#roster" class="text-sm font-medium">Roster</a></li>
                <li><a href="#team-history" class="text-sm font-medium">Team History</a></li>
                <li><a href="#head-to-head" class="text-sm font-medium">Head to Head</a></li>
                <li><a href="#draft-history" class="text-sm font-medium">Draft History</a></li>
                <li><a href="#awards" class="text-sm font-medium">Awards</a></li>
            </ul>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-4 py-6">
        <div class="flex items-center gap-4">
            <img id="team-logo" alt="" class="w-16 h-16 rounded-xl shrink-0" style="max-width:64px; max-height:64px;" />
            <div>
                <h1 id="team-name" class="text-3xl font-bold"></h1>
                <p id="owner-name" class="text-lg opacity-70"></p>
            </div>
        </div>
    </div>

    <section id="roster" class="card bg-base-100 shadow-md border border-base-300 rounded-xl overflow-hidden">
        <div class="bg-neutral text-white px-4 py-2">
            <h2 class="font-bold uppercase tracking-wide text-sm">Roster</h2>
        </div>
        <div id="rosterContainer" class="divide-y divide-base-300"></div>
    </section>

    <section id="team-history" class="card bg-base-100 shadow-md border border-base-300 rounded-xl overflow-hidden">
        <div class="bg-neutral text-white px-4 py-2">
            <h2 class="font-bold uppercase tracking-wide text-sm">Team History</h2>
        </div>
        <div id="teamHistoryContainer" class="divide-y divide-base-300"></div>
    </section>

    <section id="head-to-head" class="card bg-base-100 shadow-md border border-base-300 rounded-xl overflow-hidden">
        <div class="bg-neutral text-white px-4 py-2">
            <h2 class="font-bold uppercase tracking-wide text-sm">Head to Head</h2>
        </div>
        <div id="headToHeadContainer" class="divide-y divide-base-300"></div>
    </section>

    <section id="draft-history" class="card bg-base-100 shadow-md border border-base-300 rounded-xl overflow-hidden">
        <div class="bg-neutral text-white px-4 py-2">
            <h2 class="font-bold uppercase tracking-wide text-sm">Draft History</h2>
        </div>
        <div class="p-4">
            <select id="draftSeasonSelect" class="select select-sm border border-base-300 rounded-lg w-32"></select>
        </div>
        <div id="draftHistoryContainer" class="divide-y divide-base-300"></div>
    </section>

    <section id="awards" class="card bg-base-100 shadow-md border border-base-300 rounded-xl overflow-hidden">
        <div class="bg-neutral text-white px-4 py-2">
            <h2 class="font-bold uppercase tracking-wide text-sm">Awards</h2>
        </div>
        <div id="awardsContainer" class="divide-y divide-base-300"></div>
    </section>


    
    <script type="module" src="./team.js"></script>
</body>
</html>
