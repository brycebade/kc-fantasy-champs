<!DOCTYPE html>
<html lang="en" data-theme="kcTheme">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Page</title>
    <link rel="stylesheet" href="./output.css">
</head>
<body class="bg-base-200 text-base-content min-h-screen">
    <div class="navbar bg-base-200 px-4 py-2 shadow-md">
        <div class="flex-1 flex items-center gap-3">
            <img 
                src="./assets/kc-fantasy-champs-transparentbg-logo.png" 
                alt="KC Fantasy Champs Logo"
                class="w-12 h-12 object-contain shrink-0">
            <a class="text-2xl font-bold tracking-wide" href="index.html">KC Fantasy Champs</a>
        </div>

        <div class="flex-none">
            <ul class="menu menu-horizontal px-1">
                <li><a href="">Standings</a></li>
                <li><a href="">Schedule</a></li>
                <li class="relative">
                    <details>
                        <summary>Teams</summary>
                        <ul 
                        id="teamsDropdown" 
                        class="menu bg-base-100 rounded-box w-56 p-2 shadow absolute right-0 mt-2 z-50"
                        >
                        </ul>
                    </details>
                </li>
            </ul>
        </div>
    </div>

    <main class="max-w-2xl mx-auto px-4 py-6">
        <div class="text-center mb-6">
            <h1 id="teamName" class="text-2xl sm:text-4xl font-bold border-b-4 border-primary pb-3 inline-block">Team Draft Results</h1>
        </div>
        <div class="hidden sm:block overflow-x-auto rounded-xl border border-base-300 bg-base-100 shadow-md">
            <table class="table text-sm w-full">
                <thead>
                    <tr class="text-sm text-primary uppercase tracking-wide">
                        <th class="text-center px-2 py-3">Round</th>
                        <th class="text-center px-2 py-3">Pick</th>
                        <th class="text-center px-2 py-3">Overall</th>
                        <th class="text-left px-2 py-3">Player</th>
                        <th class="text-center px-2 py-3">Position</th>
                        <th class="text-center px-2 py-3">NFL Team</th>
                    </tr>
                </thead>

                <tbody id="draftTableBody"></tbody>
            </table>
        </div>

        <div id="draftCards" class="grid gap-3 sm:hidden"></div>
    </main>
    
    <script type="module" src="./src/pages/team.js"></script>
</body>
</html>
