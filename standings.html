<!DOCTYPE html>
<html lang="en" data-theme="kcTheme">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KCFC Standings</title>
    <link rel="stylesheet" href="./output.css">
</head>
<body class="bg-base-200 text-base-content min-h-screen overflow-x-hidden">
    <div id="navbar"></div>

    <main class="p-4 max-w-4xl mx-auto">
        <section class="card bg-base-100 shadow-md border border-base-100 rounded-xl">
            <div class="card-body">
                <h1 class="text-2xl font-bold text-primary">2025 Standings</h1>

                <div class="overflow-x-auto">
                    <table class="table ">
                        <thead>
                            <tr>
                                <th>Rank</th>
                                <th>Team</th>
                                <th>Win</th>
                                <th>Loss</th>
                                <th>Points For</th>
                                <th>Points Against</th>
                                <th>Streak</th>
                            </tr>
                        </thead>

                        <tbody id="standingsTableBody"></tbody>
                    </table>
                </div>
            </div>
        </section> 
    </main>
    
    <script type="module" src="./index.js"></script>
</body>
</html>
