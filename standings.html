<!DOCTYPE html>
<html lang="en" data-theme="kcTheme">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Standings | KC Fantasy Champs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./output.css">
    <script>
        try {
            const cached = localStorage.getItem("kc-last-theme")
            if (cached) document.documentElement.setAttribute("data-theme", cached)
        } catch (e) {}
    </script>
</head>
<body class="bg-base-200 text-base-content min-h-screen overflow-x-hidden">
    <div id="navbar"></div>

    <main class="p-4 max-w-4xl mx-auto">

        <section class="card bg-base-100 shadow-md border border-base-300 rounded-xl overflow-hidden">
            <div class="bg-neutral text-white px-4 py-2">
                <h1 class="font-bold uppercase tracking-wide text-sm">2025 Standings</h1>
            </div>
                <div class="card-body">
                    <div class="overlow-x-auto">
                        <table class="table border-separate border-spacing-y-1">
                            <thead>
                                <tr>
                                    <th>Rank</th>
                                    <th>Team</th>
                                    <th>Win</th>
                                    <th>Loss</th>
                                    <th class="hidden md:table-cell">Points For</th>
                                    <th class="hidden md:table-cell">Points Against</th>
                                    <th class="hidden md:table-cell">Streak</th>
                                </tr>
                            </thead>

                            <tbody id="standingsTableBody"></tbody>
                        </table>
                    </div>
                </div>
        </section> 

    </main>
    
    <script type="module" src="./src/pages/standings.js"></script>
</body>
</html>
