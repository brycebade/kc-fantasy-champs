<!DOCTYPE html>
<html lang="en" data-theme="kcTheme">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Former Owners | KC Fantasy Champs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./output.css">
    <script>
        try {
            const cached = localStorage.getItem("kc-last-theme")
            if (cached) document.documentElement.setAttribute("data-theme", cached)
        } catch (e) {}
    </script>
</head>

<body class="bg-base-200 text-base-content min-h-screen overflow-x-hidden">
    <div id="navbar"></div>
    <div id="archiveNav"></div>

    <div class="max-w-2xl mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold text-primary mb-6">Former Owners</h1>

        <div id="formerOwnersList"></div>

        <div id="formerOwnerDetail" style="display:none">
            <button id="backToList" class="btn btn-sm btn-outline btn-primary mb-4 gap-1">
                <span class="text-base leading-none">←</span>All Former Owners
            </button>
            <div id="ownerHeader" class="mb-6"></div>

            <div class="card bg-base-100 shadow-md border border-base-300 rounded-xl overflow-hidden mb-6">
                <div class="bg-neutral text-white px-4 py-2">
                    <h2 class="font-bold uppercase tracking-wide text-sm">Season History</h2>
                </div>
                <div id="teamHistoryContainer" class="p-0"></div>
                
                <div class="card bg-base-100 shadow-md border border-base-300 rounded-xl overflow-hidden mb-6">
                    <div class="bg-neutral text-white px-4 py-2">
                        <h2 class="font-bold uppercase tracking-wide text-sm">Awards</h2>
                    </div>
                    <div id="awardsContainer" class="p-0"></div>
                </div>
                <div class="card bg-base-100 shadow-md border border-base-300 rounded-xl overflow-hidden">
                    <div class="bg-neutral text-white px-4 py-2">
                        <h2 class="font-bold uppercase tracking-wide text-sm">Head to Head</h2>
                    </div>
                    <div id="headToHeadContainer" class="p-0"></div>
                </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="./former-owners.js"></script>
</body>
</html>
