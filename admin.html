<!DOCTYPE html>
<html lang="en" data-theme="kcTheme">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | KC Fantasy Champs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./output.css">
    <script>
        try {
            const cached = localStorage.getItem("kc-last-theme")
            if (cached) document.documentElement.setAttribute("data-theme", cached)
        } catch (e) {}
    </script>
</head>
<body class="bg-base-200 text-base-content min-h-screen">

    <div id="passwordScreen" class="admin-login-screen">
        <div class="card bg-base-100 shadow-md border border-base-300 rounded-xl w-80">
            <div class="card-body p-6">
                <h2 class="card-title text-primary mb-4">Admin Login</h2>
                <form onsubmit="return false">
                    <input type="password" id="passwordInput" placeholder="Enter Password" class="input input-bordered w-full mb-3">
                    <button id="passwordSubmit" class="btn btn-primary w-full">Submit</button>
                    <div id="errorMessage" class="text-error text-sm mt-2"></div>
                </form>
            </div>
        </div>
    </div>

    <div id="adminDashboard" style="display: none;" class="max-w-3xl mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold text-primary mb-6">Admin Dashboard</h1>

        <div class="card bg-base-100 shadow-md border border-base-300 rounded-xl mb-6">
            <div class="card-body p-4">
                <div class="flex gap-4">
                    <select id="seasonSelect" class="select select-bordered"></select>
                    <select id="weekSelect" class="select select-bordered"></select>
                </div>
            </div>
        </div>

        <div class="card bg-base-100 shadow-md border border-base-300 rounded-xl mb-6">
            <div class="card-body p-2">
                <div role="tablist" class="tabs tabs-box">
                    <a role="tab" class="tab tab-active" data-tab="scores">Scores</a>
                    <a role="tab" class="tab" data-tab="addGame">Add Game</a>
                    <a role="tab" class="tab" data-tab="finalRankings">Final Rankings</a>
                    <a role="tab" class="tab" data-tab="blurb">Blurb</a>
                    <a role="tab" class="tab" data-tab="roster">Roster</a>
                    <a role="tab" class="tab" data-tab="storylines">Storylines</a>
                    <a role="tab" class="tab" data-tab="leagueStory">League Story</a>
                </div>
            </div>
        </div>

        <div data-panel="scores">
            <div class="card bg-base-100 shadow-md border border-base-300 rounded-xl mb-6">
                <div class="card-body p-4">
                    <div id="matchupsContainer"></div>
                    <button id="submitScores" class="btn btn-primary w-full mt-4">Submit Scores</button>
                </div>
            </div>
        </div>

        <div data-panel="addGame" style="display: none">
            <div class="card bg-base-100 shadow-md border border-base-300 rounded-xl mb-6">
                <div class="card-body p-4">
                    <h2 class="card-title text-primary mb-2">Add Game</h2>
                    <select id="addGameType" class="select select-bordered mb-3">
                        <option value="regular">Regular</option>
                        <option value="playoff">Playoff</option>
                    </select>
                    <div id="playoffFields" style="display: none">
                        <select id="addGameBracket" class="select select-bordered w-full mb-2">
                            <option value="championship">Championship</option>
                            <option value="toilet">Toilet</option>
                        </select>
                        <select id="addGameRound" class="select select-bordered w-full mb-2">
                            <option value="quarterfinals">Quarterfinals</option>
                            <option value="semifinals">Semifinals</option>
                            <option value="finals">Finals</option>
                            <option value="round1">Round 1 (toilet)</option>
                            <option value="round2">Round 2 (toilet)</option>
                            <option value="round3">Round 3 (toilet)</option>
                        </select>
                        <select id="addGamePlacement" class="select select-bordered w-full mb-3">
                            <option value="">No Placement</option>
                            <option value="championship_final">Championship Final (1/2)</option>
                            <option value="third_place">Third Place (3/4)</option>
                            <option value="fifth_place">Fifth Place (5/6)</option>
                            <option value="seventh_place">Seventh Place (7/8)</option>
                            <option value="ninth_place">Ninth Place (9/10)</option>
                            <option value="toilet_final">Toilet Final (11/12)</option>
                        </select>
                    </div>
                    <div class="flex items-center justify-between gap-3 mb-2">
                        <select id="addGameTeam1" class="select select-bordered flex-1"></select>
                        <input id="addGameScore1" type="number" class="input w-20 text-center border border-base-300 bg-base-200">   
                    </div>
                    <div class="flex items-center justify-between gap-3 mb-2">
                        <select id="addGameTeam2" class="select select-bordered flex-1"></select>
                        <input id="addGameScore2" type="number" class="input w-20 text-center border border-base-300 bg-base-200">
                    </div>
                    <button id="addGame" class="btn btn-primary w-full">Add Game</button>
                </div>
            </div>
        </div>

        <div data-panel="finalRankings" style="display: none">
            <div class="card bg-base-100 shadow-md border border-base-300 rounded-xl mb-6">
                <div class="card-body p-4">
                    <button id="computeFinalRankings" class="btn btn-secondary w-full mt-2">Compute Final Rankings</button>
                    <div class="divider text-xs opacity-60">or set manually</div>
                    <h2 class="card-title text-primary mb-2">Final Rankings (Manual)</h2>
                    <button id="loadFinalRankings" class="btn btn-sm btn-primary mb-3">Load teams</button>
                    <div id="finalRankingsContainer"></div>
                    <button id="saveFinalRankings" class="btn btn-primary w-full mt-3" style="display:none">Save Final Rankings</button>
                </div>
            </div>
        </div>

        <div data-panel="blurb" style="display: none">
            <div class="card bg-base-100 shadow-md border border-base-300 rounded-xl mb-6">
                <div class="card-body p-4">
                    <h2 class="card-title text-primary mb-2">Power Rankings Blurb</h2>
                    <button id="generateBlurbInput" class="btn btn-primary btn-sm mb-2">Generate Input for AI</button>
                    <textarea id="blurbInput" readonly class="textarea textarea-bordered w-full h-40 mb-4"
                        placeholder="Click generate to build the text to paste into Claude/ChatGPT"></textarea>
                    <label class="text-sm font-semibold mb-1">Paste the AI blurb here:</label>
                    <textarea id="blurbOutput" class="textarea textarea-bordered w-full h-28 mb-3"
                        placeholder="Paste the blurb you got back..."></textarea>
                    <button id="saveBlurb" class="btn btn-primary w-full">Save Blurb</button>
                </div>
            </div>
        </div>

        <div data-panel="roster" style="display: none">
            <div class="card bg-base-100 shadow-md border border-base-300 rounded-xl mb-6">
                <div class="card-body p-4">
                    <h2 class="card-title text-primary mb-2">Roster Editor</h2>
                    <select id="rosterTeamSelect" class="select select-bordered w-full mb-3">
                        <option value="">Select a team...</option>
                    </select>
                    <div id="rosterEditorContainer"></div>

                    <div id="addFASection" style="display: none;" class="mt-4 pt-4 bordered-t border-base-300">
                        <h3 class="text-sm font-semibold text-primary mb-2">Add Free Agent Pickup</h3>
                        <input id="faPlayer" type="text" placeholder="Player Name" class="input input-bordered w-full mb-2">
                        <div class="flex gap-2 mb-2">
                            <input id="faPosition" type="text" placeholder="POS" class="input input-bordered w-20">
                            <input id="faNFLTeam" type="text" placeholder="NFL Team" class="input input-bordered flex-1">
                        </div>
                        <button id="addFAPickup" class="btn btn-primary btn-sm w-full">Add to Roster</button>
                    </div>
                </div>
            </div>
        </div>

        <div data-panel="storylines" style="display: none">
            <div class="card bg-base-100 shadow-md border border-base-300 rounded-xl mb-6">
                <div class="card-body p-4">
                    <h2 class="card-title text-primary mb-2">Storylines</h2>
                    
                    <textarea id="storylineAdminNotes" placeholder="Add any extra context or things you've notice(optional)" class="textarea textarea-bordered w-full h-20 mb-2"></textarea>
                    <button id="generateStorylinesInput" class="btn btn-primary btn-sm mb-2">Generate Input for AI</button>
                    <textarea id="storylinesPromptOutput" readonly class="textarea textarea-bordered w-full h-40 mb-4" placeholder="Click generate to build the text to paste into Claude/ChatGPT"></textarea>

                    <input id="storylineHeadline" type="text" placeholder="Headline" class="input input-bordered w-full mb-2">
                    <textarea id="storylineBlurb" placeholder="Blurb (1-2 sentences)" class="textarea textarea-bordered w-full h-24 mb-2"></textarea>
                    <input id="storylineSortOrder" type="number" placeholder="Sort Order" class="input input-bordered w-full mb-3">

                    <button id="addStoryline" class="btn btn-primary w-full mb-6">Add Storyline</button>

                    <div class="divider text-xs opacity-60">Existing Storylines</div>
                    <div id="storylinesListContainer"></div>
                </div>
            </div>
        </div>

        <div data-panel="leagueStory" style="display: none">
            <div class="card bg-base-100 shadow-md border border-base-300 rounded-xl mb-6">
                <div class="card-body p-4">
                    <h2 class="card-title text-primary mb-2">League Story</h2>

                    <select id="storySeasonSelect" class="select select-bordered w-full mb-3"></select>

                    <textarea id="storyAdminNotes" placeholder="Any extra context or moments to include (optional)" class="textarea textarea-bordered w-full h-20 mb-2"></textarea>
                    <button id="generateStoryInput" class="btn btn-primary btn-sm mb-2">Generate Input for AI</button>
                    <textarea id="storyPromptOutput" readonly class="textarea textarea=bordered w-full h-48 mb-4" placeholder="Click generate to build the text to paste into Claude/ChatGPT"></textarea>

                    <input id="storyChapterTitle" type="text" placeholder="Chapter Title" class="input input-bordered w-full mb-2">
                    <textarea id="storyChapterBody" placeholder="Past the AI-wirtten chapter here" class="textarea textarea-bordered w-full h-40 mb-3"></textarea>

                    <button id="saveStoryChapter" class="btn btn-primary w-full mb-6">Save Chapter</button>

                    <div class="divider text-xs opacity-60">Existing Chapters</div>
                    <div id="storyChaptersListContainer"></div>
                </div>
            </div>
        </div>
        
    </div>


    <script type="module" src="./admin.js"></script>
</body>
</html>
