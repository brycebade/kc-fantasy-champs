<!DOCTYPE html>
<html lang="en" data-theme="kcTheme">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFL Schedule | KC Fantasy Champs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./output.css">
    <script>
        try {
            const cached = localStorage.getItem("kc-last-theme")
            if (cached) document.documentElement.setAttribute("data-theme", cached)
        } catch (e) {}
    </script>
</head>
<body class="bg-base-200 text-base-content min-h-screen overflow-x-hidden">
    <div id="navbar"></div>

    <main class="max-w-4xl mx-auto px-4 py-8">
        <div class="card bg-base-100 shadow-md border border-base-300 rounded-xl overflow-hidden">
            <div class="bg-neutral text-white px-4 py-2 flex items-center justify-between">
                <h1 class="font-bold uppercase tracking-wide text-sm">NFL Schedule</h1>
                <select id="nflWeekSelect" class="select select-sm rounded-lg w-32" style="color: #1f2937; background-color: white;"></select>
            </div>
            <div id="nflScheduleContainer" class="p-4"></div>
        </div>
    </main>
    
    <script type="module" src="./nflSchedule.js"></script>
</body>
</html>
