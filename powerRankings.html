<!DOCTYPE html>
<html lang="en" data-theme="kcTheme>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Power Rankings | KC Fantasy Champs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./output.css">
    <script>
        try {
            const cached = localStorage.getItem("kc-last-theme")
            if (cached) document.documentElement.setAttribute("data-theme", cached)
        } catch (e) {}
    </script>
</head>
<body class="bg-base-200 text-base-content min-h-screen overflow-x-hidden">
    <div id="navbar"></div>

    <div class="max-w-2xl mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold text-primary mb-6">Power Rankings</h1>
        <div class="card bg-base-100 shadow-md border border-base-300 rounded-xl overflow-hidden">
           <div class="card-body p-4">
            <div id="powerRankingsPageContainer"></div>
           </div> 
        </div>
    </div>

    <script type="module" src="./power-rankings.js"></script>
</body>
</html>
